     id="text8"><tspan
       sodipodi:role="line"
       id="tspan8"
       x="995.67419"
       y="74.352211">Scotch Tape here after leveling and aligning the pieces</tspan></text>
  <text
     xml:space="preserve"
     style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-family:Arial;-inkscape-font-specification:Arial;text-align:start;writing-mode:lr-tb;direction:ltr;text-anchor:start;fill:#000000;stroke:#000000;stroke-width:0"
     x="1710.7937"
     y="152.45549"
     id="text9"><tspan
       sodipodi:role="line"
       id="tspan9"
       x="1710.7937"
       y="152.45549">1. Place the stencil on the wall</tspan><tspan
       sodipodi:role="line"
       x="1710.7937"
       y="167.45549"
       id="tspan10">2. Level it with bubble leveler</tspan><tspan
       sodipodi:role="line"
       x="1710.7937"
       y="182.45549"
       id="tspan11">3. Place the Blaze Art to make sure its leveled and looks good</tspan><tspan
       sodipodi:role="line"
       x="1710.7937"
       y="197.45549"
       id="tspan12">4. Tape the stencil, so you have the outline where the drills should be</tspan><tspan
       sodipodi:role="line"
       x="1710.7937"
       y="212.45549"
       id="tspan13">5. At least 2 pieces need to be drilled and hooked for stability. </tspan><tspan
       sodipodi:role="line"
       x="1710.7937"
       y="227.45549"
       id="tspan14">    After attaching the remaining ones using Magnetic Modular System,</tspan><tspan
       sodipodi:role="line"
       x="1710.7937"
       y="242.45549"
       id="tspan15">    please check for stability. For larger collages, its recommended to hook </tspan><tspan
       sodipodi:role="line"
       x="1710.7937"
       y="257.45547"
       id="tspan16">    more than 2 pieces for safety.  </tspan></text>
</svg>
