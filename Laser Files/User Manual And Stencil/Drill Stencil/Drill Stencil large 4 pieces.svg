  <text
     xml:space="preserve"
     style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:12.0952px;font-family:Arial;-inkscape-font-specification:Arial;text-align:start;writing-mode:lr-tb;direction:ltr;text-anchor:start;fill:#000000;stroke:#000000;stroke-width:0"
     x="1260.5999"
     y="118.99585"
     id="text9"
     transform="scale(1.0079307,0.99213171)"><tspan
       sodipodi:role="line"
       id="tspan9"
       x="1260.5999"
       y="118.99585"
       style="stroke-width:0">1. Place the stencil on the wall</tspan><tspan
       sodipodi:role="line"
       x="1260.5999"
       y="134.11485"
       id="tspan10"
       style="stroke-width:0">2. Level it with bubble leveler</tspan><tspan
       sodipodi:role="line"
       x="1260.5999"
       y="149.23386"
       id="tspan11"
       style="stroke-width:0">3. Place the Blaze Art to make sure its leveled and looks good</tspan><tspan
       sodipodi:role="line"
       x="1260.5999"
       y="164.35284"
       id="tspan17"
       style="stroke-width:0">4. Tape the stencil, so you have the outline where the drills should be. </tspan><tspan
       sodipodi:role="line"
       x="1260.5999"
       y="179.47185"
       style="stroke-width:0"
       id="tspan34">5. At least 2 pieces need to be drilled and hooked for stability.</tspan><tspan
       sodipodi:role="line"
       x="1260.5999"
       y="194.59085"
       style="stroke-width:0"
       id="tspan35">    Choose which ones you want to hang, and drill the corresponding holes.</tspan><tspan
       sodipodi:role="line"
       x="1260.5999"
       y="209.70984"
       style="stroke-width:0"
       id="tspan40">    (Note that the side art's drill are close to the edge because of the paper </tspan><tspan
       sodipodi:role="line"
       x="1260.5999"
       y="224.82884"
       style="stroke-width:0"
       id="tspan41">    size. If you choose those as the ones to hang, please drill where the </tspan><tspan
       sodipodi:role="line"
       x="1260.5999"
       y="239.94785"
       style="stroke-width:0"
       id="tspan36">    center of the circle would be, which is close to the edge of the paper)</tspan><tspan
       sodipodi:role="line"
       x="1260.5999"
       y="255.06685"
       style="stroke-width:0"
       id="tspan48">7. Remove the stencil after drilling, and attach the flush mount &amp; hang the </tspan><tspan
       sodipodi:role="line"
       x="1260.5999"
       y="270.18585"
       style="stroke-width:0"
       id="tspan49">    selected 2 (or more) art.</tspan><tspan
       sodipodi:role="line"
       x="1260.5999"
       y="285.30484"
       id="tspan14"
       style="stroke-width:0">6. After attaching the remaining ones using Magnetic Modular System,</tspan><tspan
       sodipodi:role="line"
       x="1260.5999"
       y="300.42383"
       id="tspan15"
       style="stroke-width:0">    please check for stability. For larger collages, its recommended to hook </tspan><tspan
       sodipodi:role="line"
       x="1260.5999"
       y="315.54285"
       id="tspan16"
       style="stroke-width:0">    more than 2 pieces for safety.  </tspan></text>
